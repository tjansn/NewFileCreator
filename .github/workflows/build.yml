name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build (ad-hoc signed)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: make build

      - name: Verify signature
        run: codesign --verify --deep --strict --verbose=2 build/NewFileCreator.app
